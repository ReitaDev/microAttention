<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .formula { font-family: ui-monospace, monospace; font-size: 18px; fill: #2C2C2A; }
      .ann { font-size: 11px; fill: #5F5E5A; }
      .annb { font-size: 11px; font-weight: 500; fill: #2C2C2A; }
      .leader { stroke: #B4B2A9; stroke-width: 0.8; stroke-dasharray: 3 3; fill: none; }
    </style>
  </defs>

  <!-- The formula centred -->
  <text class="formula" x="340" y="80" text-anchor="middle">Attention(Q, K, V)  =  softmax( Q K&#x1D57; / &#x221A;d_k ) · V</text>

  <!-- Underline spans to mark regions -->
  <!-- softmax -->
  <rect x="246" y="88" width="75" height="3" rx="1" fill="#D4537E" opacity="0.7"/>
  <!-- QK^T -->
  <rect x="325" y="88" width="40" height="3" rx="1" fill="#185FA5" opacity="0.7"/>
  <!-- /sqrt(d_k) -->
  <rect x="367" y="88" width="52" height="3" rx="1" fill="#0F6E56" opacity="0.7"/>
  <!-- · V -->
  <rect x="425" y="88" width="22" height="3" rx="1" fill="#BA7517" opacity="0.7"/>

  <!-- softmax annotation -->
  <line class="leader" x1="283" y1="91" x2="200" y2="135"/>
  <text class="annb" x="46" y="140" fill="#993556">softmax</text>
  <text class="ann" x="46" y="154">converts raw scores into</text>
  <text class="ann" x="46" y="168">weights that sum to 1.0.</text>
  <text class="ann" x="46" y="182">amplifies high scores,</text>
  <text class="ann" x="46" y="196">suppresses low ones.</text>

  <!-- QK^T annotation -->
  <line class="leader" x1="345" y1="91" x2="320" y2="165"/>
  <text class="annb" x="260" y="170" fill="#185FA5">Q K&#x1D57;</text>
  <text class="ann" x="248" y="184">dot product of every query</text>
  <text class="ann" x="248" y="198">against every key. produces</text>
  <text class="ann" x="248" y="212">an n × n matrix of scores.</text>

  <!-- /sqrt(dk) annotation -->
  <line class="leader" x1="393" y1="91" x2="420" y2="160"/>
  <text class="annb" x="404" y="170" fill="#0F6E56">/ &#x221A;d_k</text>
  <text class="ann" x="392" y="184">scale factor. d_k is the</text>
  <text class="ann" x="392" y="198">dimension of the key vectors.</text>
  <text class="ann" x="392" y="212">here d_k = 8, so &#x221A;d_k ≈ 2.83.</text>

  <!-- V annotation -->
  <line class="leader" x1="436" y1="91" x2="560" y2="140"/>
  <text class="annb" x="548" y="150" fill="#BA7517">· V</text>
  <text class="ann" x="530" y="164">weighted average of</text>
  <text class="ann" x="530" y="178">the value vectors.</text>
  <text class="ann" x="530" y="192">each value scaled by</text>
  <text class="ann" x="530" y="206">its attention weight.</text>

  <!-- Matrix dimension note -->
  <rect x="40" y="240" width="600" height="52" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ann" x="340" y="258" text-anchor="middle" fill="#444441">matrix dimensions for n tokens, d_k dimensions:</text>
  <text class="ann" x="340" y="276" text-anchor="middle" fill="#444441">Q is n × d_k   ·   K&#x1D57; is d_k × n   →   scores is n × n   →   weights is n × n   ·   V is n × d_k   →   output is n × d_k</text>
  <text class="ann" x="340" y="291" text-anchor="middle" fill="#888780">for "the corpus was wrong": n = 4, d_k = 8, so scores is 4 × 4</text>
</svg>
